name: Update Scrobble

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 10 minutes
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write
  contents: write  # Allows pushing changes to the repository

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Fetch currently scrobbling track
      run: |
        curl -s "https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${{ secrets.LASTFM_USERNAME }}&api_key=${{ secrets.LASTFM_API_KEY }}&format=json&limit=1" > scrobble.json
    
    - name: Update scrobble in HTML file
      run: |
        track_info=$(jq -r '.recenttracks.track[0] | "Currently Scrobbling: \(.artist[\"#text\"]) - \(.name) (Album: \(.album[\"#text\"]))"' scrobble.json)
        sed -i 's|<p id="scrobble-info">.*</p>|<p id="scrobble-info">'"$track_info"'</p>|' index.html

    - name: Commit and Push changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add index.html
        git commit -m "Update scrobble [skip ci]"
        git push

